name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Rust build
        working-directory: src-tauri
        run: cargo build

      - name: Frontend build
        run: npm run build
